# Commands approved for ai_helper.py
# Rules are checked in order: block first, then allow.
# Use * as a token wildcard (matches any number of tokens, including zero).

allow:
  # --- server_CFG llama-server CLI ---
  - "python C:/10x001/server_CFG/cli.py start gemma-4-E4B-her --no-wait"
  - "python C:/10x001/server_CFG/cli.py stop"
  - "python C:/10x001/server_CFG/cli.py status"
  - "python C:/10x001/server_CFG/cli.py logs *"
  - "python C:/10x001/server_CFG/cli.py list"
  - "python C:/10x001/server_CFG/cli.py restart gemma-4-E4B-her --no-wait"
  - "python C:/10x001/server_CFG/cli.py help"

  # --- uvicorn / server helpers ---
  - "pkill * uvicorn"
  - "python * uvicorn *"
  - "python3 * uvicorn *"
  - "py * uvicorn *"

  # --- port checks ---
  - "netstat * | grep *"
  - "netstat * | findstr *"
  - "ss * | grep *"

block:
  - "rm *"
  - "del *"
  - "rmdir *"
  - "format *"
  - "shutdown *"
  - "mkfs *"
  - "dd *"
